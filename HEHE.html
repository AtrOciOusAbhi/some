<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0008;width:100vw;height:100vh;overflow:hidden;font-family:'Lato',sans-serif;}
canvas{position:absolute;top:0;left:0;display:block;}
#bg-canvas{z-index:1;}
#tree-canvas{z-index:2;}

/* ── word-by-word span ── */
.word{display:inline-block;opacity:0;transform:translateY(14px) scale(.90);transition:opacity .7s ease,transform .7s ease;}
.word.show{opacity:1;transform:translateY(0) scale(1);}

/* ── start screen ── */
#start-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;cursor:pointer;}
.s-heart{font-size:88px;animation:spulse 1.4s ease-in-out infinite;filter:drop-shadow(0 0 28px #ff2d78);}
.s-label{margin-top:20px;color:#ff6fa3;font-family:'Playfair Display',serif;font-size:22px;letter-spacing:3px;animation:sblink 2s ease-in-out infinite;}
.s-sub{margin-top:8px;color:#ff2d78;font-family:'Lato',sans-serif;font-size:16px;letter-spacing:1px;}
@keyframes spulse{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
@keyframes sblink{0%,100%{opacity:.4}50%{opacity:1}}

/* ── left message panel ── */
#msg{position:absolute;left:6%;top:50%;transform:translateY(-50%);width:36%;z-index:10;opacity:0;pointer-events:none;transition:opacity .8s ease;}
.msg-small{color:#ccc;font-size:clamp(13px,1.4vw,17px);font-weight:300;margin-bottom:10px;min-height:1.4em;}
.msg-big{font-family:'Playfair Display',serif;font-size:clamp(32px,4.5vw,64px);font-weight:700;color:#fff;line-height:1.22;margin-bottom:18px;min-height:2.5em;}
.msg-big .word-pink{color:#ff2d78;}
.msg-divider{width:0px;height:2px;background:linear-gradient(90deg,#ff2d78,transparent);margin-bottom:22px;transition:width 1s ease;}
.msg-divider.show{width:60px;}
.msg-divider-dot{display:inline-block;width:6px;height:6px;background:#ff2d78;border-radius:50%;margin-left:6px;vertical-align:middle;}
.msg-body{color:#ccc;font-size:clamp(13px,1.3vw,16px);font-weight:300;line-height:1.9;margin-bottom:18px;min-height:4em;}
.msg-accent{color:#ff2d78;font-size:clamp(13px,1.3vw,16px);font-style:italic;margin-bottom:28px;min-height:1.4em;}
#yes-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 36px;background:linear-gradient(135deg,#ff2d78,#ff6fa3);color:#fff;border:none;border-radius:50px;font-family:'Lato',sans-serif;font-size:18px;font-weight:400;cursor:pointer;opacity:0;transform:translateY(12px);transition:opacity .7s,transform .7s,box-shadow .3s;box-shadow:0 0 30px rgba(255,45,120,.5);pointer-events:none;}
#yes-btn.show{opacity:1;transform:translateY(0);pointer-events:all;}
#yes-btn:hover{box-shadow:0 0 60px rgba(255,45,120,.9);transform:scale(1.05);}

/* ── SLIDESHOW ── */
#slideshow{position:absolute;inset:0;z-index:40;opacity:0;pointer-events:none;transition:opacity 1s;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,0,8,.92);}
#slideshow.active{opacity:1;pointer-events:all;}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .8s ease;pointer-events:none;}
.slide.visible{opacity:1;pointer-events:all;}
.slide-img-wrap{position:relative;width:min(72vw,520px);height:min(52vh,400px);border-radius:20px;overflow:hidden;box-shadow:0 0 60px rgba(255,45,120,.5),0 0 120px rgba(255,45,120,.2);}
.slide-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.slide-img-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#1a0010,#2d0020);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.slide-img-placeholder .ph-icon{font-size:64px;opacity:.4;}
.slide-img-placeholder .ph-text{color:#ff6fa3;font-family:'Playfair Display',serif;font-size:15px;opacity:.6;text-align:center;padding:0 20px;}
.slide-caption{margin-top:24px;color:#fff;font-family:'Playfair Display',serif;font-size:clamp(18px,2.5vw,28px);font-style:italic;text-align:center;text-shadow:0 0 20px rgba(255,45,120,.7);max-width:600px;padding:0 20px;min-height:2em;}
.slide-num{position:absolute;top:30px;right:40px;color:#ff6fa3;font-size:14px;letter-spacing:2px;opacity:.6;}
.slide-heart-deco{position:absolute;top:24px;left:40px;font-size:28px;opacity:.5;animation:spulse 2s ease-in-out infinite;}

/* nav arrows */
.slide-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,45,120,.15);border:1px solid rgba(255,45,120,.3);color:#ff6fa3;width:48px;height:48px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .3s;z-index:5;}
.slide-nav:hover{background:rgba(255,45,120,.35);}
#slide-prev{left:20px;}
#slide-next{right:20px;}

/* progress dots */
#slide-dots{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:8px;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,45,120,.3);transition:background .3s,transform .3s;}
.dot.active{background:#ff2d78;transform:scale(1.3);}

/* ── HEART MOSAIC ── */
#mosaic{position:absolute;inset:0;z-index:50;opacity:0;pointer-events:none;transition:opacity 1.2s;background:#0a0008;display:flex;align-items:center;justify-content:center;}
#mosaic.active{opacity:1;}
#mosaic-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
#mosaic-canvas{display:block;position:relative;z-index:1;}
.mosaic-center-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-44%);text-align:center;z-index:2;pointer-events:none;white-space:nowrap;}
.mosaic-center-msg h1{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,72px);color:#fff;font-style:italic;text-shadow:0 0 30px #ff2d78,0 0 60px rgba(255,45,120,.6);line-height:1.2;}
.mosaic-center-msg h1 .word-pink{color:#ff2d78;}
.mosaic-center-msg p{color:#ffb3ce;font-size:clamp(12px,1.4vw,18px);margin-top:8px;letter-spacing:3px;font-weight:300;}
</style>
</head>

<script>
/* ============================================================
   WORD-BY-WORD UTILITY
============================================================ */
document.getElementById('start-screen').addEventListener('click',()=>{
  document.getElementById('start-screen').style.display='none';
  
  // --- AUDIO PLAY FIX ---
  const bgMusic = document.getElementById('bg-music');
  if(bgMusic) {
    bgMusic.play().catch(err => console.log("Audio blocked by browser:", err));
  }
  // ----------------------

  buildAll();initBgParts();phase='growing';phaseStart=performance.now();requestAnimationFrame(loop);
});

function typeWords(el, rawHTML, msBetween, pinkWords){
  return new Promise(resolve=>{
    const temp=document.createElement('div');
    temp.innerHTML=rawHTML;
    const tokens=[];
    temp.childNodes.forEach(node=>{
      if(node.nodeType===3){
        node.textContent.split(/(\s+)/).forEach(t=>{if(t.trim())tokens.push({type:'word',val:t.trim()});else if(t.includes('\n')||false){}else tokens.push({type:'space'});});
      } else if(node.nodeName==='BR'){
        tokens.push({type:'br'});
      } else if(node.nodeName==='SPAN'){
        tokens.push({type:'span',val:node.outerHTML,text:node.textContent.trim()});
      }
    });

    el.innerHTML='';
    const wordEls=[];
    tokens.forEach(tok=>{
      if(tok.type==='br'){el.appendChild(document.createElement('br'));return;}
      if(tok.type==='space'){el.appendChild(document.createTextNode(' '));return;}
      const span=document.createElement('span');
      span.className='word';
      if(tok.type==='span'){
        span.innerHTML=tok.val;
        span.querySelector('span')&&(span.querySelector('span').style.color='');
        span.classList.add('word-pink');
      } else {
        span.textContent=tok.val;
        if(pinkWords&&pinkWords.includes(tok.val)) span.classList.add('word-pink');
      }
      el.appendChild(span);
      el.appendChild(document.createTextNode(' '));
      wordEls.push(span);
    });

    if(!wordEls.length){resolve();return;}
    wordEls.forEach((w,i)=>{
      setTimeout(()=>{
        w.classList.add('show');
        if(i===wordEls.length-1) setTimeout(resolve, msBetween+200);
      }, i*msBetween);
    });
  });
}

/* ======================================================
   TREE ENGINE
====================================================== */
const bgC=document.getElementById('bg-canvas');
const tC=document.getElementById('tree-canvas');
const bgX=bgC.getContext('2d');
const ctx=tC.getContext('2d');
let W,H;
function resize(){W=bgC.width=tC.width=window.innerWidth;H=bgC.height=tC.height=window.innerHeight;}
resize();
window.addEventListener('resize',()=>{resize();buildAll();});

const PINKS=['#ff2d78','#ff4d8f','#ff6fa3','#ff91b8','#ff1a6a','#e91e63','#f06292','#ff80ab','#c2185b','#ff5c8a'];

function drawHeart(cx,cy,r,color,alpha,glow=false){
  if(alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=Math.min(alpha,1);ctx.fillStyle=color;
  if(glow){ctx.shadowColor=color;ctx.shadowBlur=14;}
  ctx.beginPath();ctx.moveTo(cx,cy+r*.35);
  ctx.bezierCurveTo(cx,cy-r*.1,cx-r*1.05,cy-r*.1,cx-r*1.05,cy+r*.5);
  ctx.bezierCurveTo(cx-r*1.05,cy+r*1.05,cx,cy+r*1.65,cx,cy+r*1.65);
  ctx.bezierCurveTo(cx,cy+r*1.65,cx+r*1.05,cy+r*1.05,cx+r*1.05,cy+r*.5);
  ctx.bezierCurveTo(cx+r*1.05,cy-r*.1,cx,cy-r*.1,cx,cy+r*.35);
  ctx.closePath();ctx.fill();ctx.restore();
}

let TRUNK_BX,TRUNK_BY,TRUNK_H_VAL,TRUNK_TY,BRANCH_L;
function calcGeo(){
  TRUNK_BX=W/2;
  TRUNK_BY=H + 10; 
  TRUNK_H_VAL=H*.36; 
  TRUNK_TY=TRUNK_BY-TRUNK_H_VAL;
  BRANCH_L=H*.16;    
}

let SEG=[];
function addBranch(x1,y1,ang,len,thick){
  if(len<4||thick<1.2)return;
  const x2=x1+Math.cos(ang)*len,y2=y1+Math.sin(ang)*len;
  SEG.push({x1,y1,x2,y2,thick});
  
  addBranch(x2,y2,ang-.42,len*.70,thick*.68);
  addBranch(x2,y2,ang+.42,len*.70,thick*.68);
  
  if(thick>6) {
      addBranch(x2,y2,ang+(Math.random()*.2-.1),len*.55,thick*.50);
  }
}

function buildBranches(){
  SEG=[];calcGeo();
  addBranch(TRUNK_BX,TRUNK_TY,-Math.PI/2-.38,BRANCH_L,18);
  addBranch(TRUNK_BX,TRUNK_TY,-Math.PI/2+.38,BRANCH_L,18);
  addBranch(TRUNK_BX,TRUNK_TY,-Math.PI/2,BRANCH_L*.85,15);
}

let leaves=[];
const N_LEAVES=1200; 
function getBranchTips(){const t=[];SEG.forEach(s=>{if(s.thick<6)t.push({x:s.x2,y:s.y2});});return t;}
function buildLeaves(){
  leaves=[];calcGeo();if(SEG.length===0)buildBranches();
  const tips=getBranchTips();if(!tips.length)return;
  for(let i=0;i<N_LEAVES;i++){
    const tip=tips[Math.floor(Math.random()*tips.length)];
    const spread=H*.06+Math.random()*H*.08,angle=Math.random()*Math.PI*2;
    leaves.push({cx:tip.x+Math.cos(angle)*spread,cy:tip.y+Math.sin(angle)*spread,r:4+Math.random()*10,color:PINKS[Math.floor(Math.random()*PINKS.length)],wobble:Math.random()*Math.PI*2,wspeed:.010+Math.random()*.016,delay:Math.random()});
  }
}
function buildAll(){buildBranches();buildLeaves();}
buildAll();

let bgParts=[];
function initBgParts(){
  bgParts=[];
  for(let i=0;i<120;i++)bgParts.push({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*3,alpha:.15+Math.random()*.35,vy:-.2-Math.random()*.4,wobble:Math.random()*Math.PI*2});
}
initBgParts();
function drawBg(){
  bgX.clearRect(0,0,W,H);
  const grd=bgX.createRadialGradient(W/2,H*.88,10,W/2,H*.88,H*.25);
  grd.addColorStop(0,'rgba(255,45,120,.18)');grd.addColorStop(1,'transparent');
  bgX.fillStyle=grd;bgX.fillRect(0,0,W,H);
  bgParts.forEach(p=>{
    p.wobble+=.012;p.y+=p.vy;if(p.y<-20)p.y=H+10;p.x+=Math.sin(p.wobble)*.4;
    bgX.save();bgX.globalAlpha=p.alpha;bgX.fillStyle='#ff2d78';bgX.shadowColor='#ff2d78';bgX.shadowBlur=6;
    bgX.beginPath();const r=p.r,cx=p.x,cy=p.y;
    bgX.moveTo(cx,cy+r*.35);bgX.bezierCurveTo(cx,cy-r*.1,cx-r*1.05,cy-r*.1,cx-r*1.05,cy+r*.5);
    bgX.bezierCurveTo(cx-r*1.05,cy+r*1.05,cx,cy+r*1.65,cx,cy+r*1.65);
    bgX.bezierCurveTo(cx,cy+r*1.65,cx+r*1.05,cy+r*1.05,cx+r*1.05,cy+r*.5);
    bgX.bezierCurveTo(cx+r*1.05,cy-r*.1,cx,cy-r*.1,cx,cy+r*.35);
    bgX.closePath();bgX.fill();bgX.restore();
  });
}
let particles=[];
function spawnParticle(){particles.push({x:Math.random()*W,y:H+10,r:5+Math.random()*14,color:PINKS[Math.floor(Math.random()*PINKS.length)],vx:(Math.random()-.5)*1.4,vy:-(1+Math.random()*2),life:1});}

function renderTree(gp,lp,shiftX){
  ctx.save();ctx.translate(shiftX,0);
  if(gp>.5){const ga=Math.min((gp-.5)*2,1);const gr=ctx.createRadialGradient(TRUNK_BX,TRUNK_BY,0,TRUNK_BX,TRUNK_BY,H*.15);gr.addColorStop(0,`rgba(255,45,120,${.35*ga})`);gr.addColorStop(1,'transparent');ctx.fillStyle=gr;ctx.fillRect(-W,0,W*3,H);}
  const th=TRUNK_H_VAL*Math.min(gp*2.2,1),tw=24*Math.min(gp*3,1);
  
  const baseW=(tw+36)*Math.min(gp*3,1); 
  const topW = (tw*1.1)*Math.min(gp*3,1); 
  const tx=TRUNK_BX, ty=TRUNK_BY, topY=TRUNK_BY-th;
  
  ctx.save();
  ctx.shadowColor='#ff2d78';ctx.shadowBlur=28;
  ctx.beginPath();
  ctx.moveTo(tx-baseW/2-6, ty);
  ctx.bezierCurveTo(tx-baseW/2-6, ty-th*0.3, tx-topW/2-3, topY+th*0.3, tx-topW/2-3, topY);
  ctx.lineTo(tx+topW/2+3, topY);
  ctx.bezierCurveTo(tx+topW/2+3, topY+th*0.3, tx+baseW/2+6, ty-th*0.3, tx+baseW/2+6, ty);
  ctx.closePath();
  ctx.fillStyle='rgba(255,45,120,.22)';ctx.fill();ctx.restore();
  
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tx-baseW/2, ty);
  ctx.bezierCurveTo(tx-baseW/2, ty-th*0.3, tx-topW/2, topY+th*0.3, tx-topW/2, topY);
  ctx.lineTo(tx+topW/2, topY);
  ctx.bezierCurveTo(tx+topW/2, topY+th*0.3, tx+baseW/2, ty-th*0.3, tx+baseW/2, ty);
  ctx.closePath();
  const trunkGrad=ctx.createLinearGradient(tx,ty,tx,topY);
  trunkGrad.addColorStop(0,'#ff4d8f');
  trunkGrad.addColorStop(0.5,'#ffb3ce');
  trunkGrad.addColorStop(1,'#ffe0ee');
  ctx.fillStyle=trunkGrad;ctx.fill();ctx.restore();

  if(gp>.28){const bp=Math.min(1,(gp-.28)/.72);SEG.forEach(s=>{const ex=s.x1+(s.x2-s.x1)*bp,ey=s.y1+(s.y2-s.y1)*bp;ctx.save();ctx.shadowColor='#ff2d78';ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(ex,ey);ctx.lineWidth=Math.max(2,s.thick*Math.min(gp*2.2,1))+3;ctx.strokeStyle='rgba(255,45,120,.22)';ctx.lineCap='round';ctx.stroke();ctx.restore();ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(ex,ey);ctx.lineWidth=Math.max(1.5,s.thick*Math.min(gp*2.2,1));ctx.strokeStyle='rgba(255,185,210,.92)';ctx.lineCap='round';ctx.stroke();});}
  if(lp>0){leaves.forEach(l=>{l.wobble+=l.wspeed;const a=Math.max(0,Math.min(1,(lp-l.delay*.45)*2.8));if(a<=0)return;drawHeart(l.cx+Math.sin(l.wobble)*2,l.cy+Math.cos(l.wobble*.7)*1.5,l.r,l.color,a,true);});}
  ctx.restore();
}

/* ── message reveal word-by-word ── */
async function startReveal(){
  const panel=document.getElementById('msg');
  panel.style.opacity='1';panel.style.pointerEvents='auto';
  await delay(400);
  await typeWords(document.getElementById('ms0'),'To the most amazing girl you will ever meet, <span style="color:#ff2d78">♥</span>', 180);
  await delay(300);
  await typeWords(document.getElementById('ms1'),'I Love<br>you <span style="color:#ff2d78">forever!</span>', 240);
  await delay(300);
  document.getElementById('ms2').classList.add('show');
  await delay(700);
  await typeWords(document.getElementById('ms3'),"See i may be very clingy,<br>I may do many things others don't,<br>I may be very weird.<br>But one thing is for sure,<br>nobody in this whole world,<br>will love you as much as I do!", 130);
  await delay(300);
  await typeWords(document.getElementById('ms4'),"I can't wait to spend my time with you I dont want to be seprate for even a second.", 180);
  await delay(400);
  document.getElementById('yes-btn').classList.add('show');
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

let phase='idle',phaseStart=0,treeShiftX=0,growProg=0,leafProg=0,shiftT=0;
function eio(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
function loop(ts){
  requestAnimationFrame(loop);drawBg();ctx.clearRect(0,0,W,H);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=.004;drawHeart(p.x,p.y,p.r,p.color,p.life*.9,true);});
  if(Math.random()<.08&&phase!=='idle')spawnParticle();
  if(phase==='idle')return;
  const el=(ts-phaseStart)/1000;
  if(phase==='growing'){growProg=Math.min(1,el/6.5);leafProg=growProg>.60?Math.min(1,(growProg-.60)/.40):0;renderTree(growProg,leafProg,0);if(growProg>=1){phase='shifting';phaseStart=ts;}return;}
  if(phase==='shifting'){shiftT=Math.min(1,el/2.0);treeShiftX=eio(shiftT)*W*.27;renderTree(1,1,treeShiftX);if(shiftT>=1){phase='revealing';phaseStart=ts;startReveal();}return;}
  if(phase==='revealing'||phase==='done')renderTree(1,1,treeShiftX);
}
document.getElementById('start-screen').addEventListener('click',()=>{
  document.getElementById('start-screen').style.display='none';
  buildAll();initBgParts();phase='growing';phaseStart=performance.now();requestAnimationFrame(loop);
});
requestAnimationFrame(loop);

/* ======================================================
   SLIDESHOW
====================================================== */
const SLIDES=[
 {caption:"Every moment with you is my favourite 🌸"}, 
 {caption:"You light up my whole world ✨"}, 
 {caption:"My favourite person, always 💫"}, 
 {caption:"Laughing with you is my happy place 😄"}, 
 {caption:"Wherever you are, that's home 🏡"}, 
 {caption:"You're the best thing that happened to me 🌹"}, 
 {caption:"And this is just the beginning… 💕"}, 
 {caption:"Your smile is my peace 🌷"}, 
 {caption:"You make life magical ✨"}, 
 {caption:"Every memory with you is priceless 💖"}, 
 {caption:"Forever starts with you 💍"}, 
 {caption:"You are my dream come true 🌙"}, 
 {caption:"With you, everything feels perfect 💞"}, 
 {caption:"I’ll choose you in every lifetime ❤️"}
];

let currentSlide=0;
let userImages=[];

function buildSlideshow(){
  const ss=document.getElementById('slideshow');
  ss.querySelectorAll('.slide').forEach(e=>e.remove());

  SLIDES.forEach((s,i)=>{
    const slide=document.createElement('div');
    slide.className='slide'+(i===0?' visible':'');
    slide.innerHTML=`
      <div class="slide-heart-deco">♥</div>
      <div class="slide-num">${i+1} / ${SLIDES.length}</div>
      <div class="slide-img-wrap" id="imgwrap-${i}">
        ${userImages[i]
          ?`<img src="${userImages[i]}" alt="Memory ${i+1}">`
          :`<div class="slide-img-placeholder">
              <div class="ph-icon">📷</div>
              <div class="ph-text">Replace with your photo<br><small style="opacity:.5">(see instructions below)</small></div>
            </div>`
        }
      </div>
      <div class="slide-caption" id="scap-${i}"></div>
    `;
    ss.insertBefore(slide,ss.querySelector('.slide-nav'));
  });

  const dotsEl=document.getElementById('slide-dots');
  dotsEl.innerHTML='';
  SLIDES.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.onclick=()=>goSlide(i);
    dotsEl.appendChild(d);
  });
  
  typeCaption(0);
}

function typeCaption(idx){
  const el=document.getElementById('scap-'+idx);
  if(!el)return;
  el.innerHTML='';
  typeWords(el, SLIDES[idx].caption, 180);
}

function goSlide(n){
  const slides=document.querySelectorAll('.slide');
  const dots=document.querySelectorAll('.dot');
  slides[currentSlide].classList.remove('visible');
  dots[currentSlide].classList.remove('active');
  currentSlide=((n%SLIDES.length)+SLIDES.length)%SLIDES.length;
  slides[currentSlide].classList.add('visible');
  dots[currentSlide].classList.add('active');
  
  typeCaption(currentSlide);
  
  if(currentSlide===SLIDES.length-1){
    setTimeout(showMosaic,3600);
  }
}
function nextSlide(){goSlide(currentSlide+1);}
function prevSlide(){goSlide(currentSlide-1);}

function startSlideshow(){
  for(let i=0;i<100;i++)setTimeout(spawnParticle,i*25);
  buildSlideshow();
  const ss=document.getElementById('slideshow');
  ss.classList.add('active');
  document.getElementById('msg').style.opacity='0';
  autoAdvance();
}

let autoTimer=null;
function autoAdvance(){
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>{
    if(currentSlide<SLIDES.length-1){nextSlide();autoAdvance();}
  },3800);
}
document.getElementById('slide-prev').addEventListener('click',()=>{clearTimeout(autoTimer);});
document.getElementById('slide-next').addEventListener('click',()=>{clearTimeout(autoTimer);});

/* ======================================================
   HEART MOSAIC — 14 photos arranged as heart border
====================================================== */
function showMosaic(){
  const mc=document.getElementById('mosaic');
  mc.classList.add('active');
  document.getElementById('slideshow').classList.remove('active');
  drawMosaic();
  
  // Wait for all 14 tiles to draw before typing the centre message
  // Delay increased to match the new 500ms intervals
  const tileDelay = 14 * 500 + 800;
  setTimeout(async ()=>{
    await typeWords(document.getElementById('mosaic-h1'),'I <span style="color:#ff2d78">love</span> you',320);
    await delay(400);
    await typeWords(document.getElementById('mosaic-p'),'forever & always ♥',220);
  }, tileDelay);
}

/* Heart parametric point at angle t (0..2π), returns {x,y} in -1..1 space */
function heartPoint(t){
  return {
    x: 16*Math.pow(Math.sin(t),3),
    y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

/* Draw a rounded-rect clipped image tile */
function drawImageTile(mCtx, img, cx, cy, w, h, radius, pinkFallbackIdx){
  mCtx.save();
  /* rounded rect clip */
  const x=cx-w/2, y=cy-h/2;
  mCtx.beginPath();
  mCtx.moveTo(x+radius,y);
  mCtx.lineTo(x+w-radius,y);mCtx.arcTo(x+w,y,x+w,y+radius,radius);
  mCtx.lineTo(x+w,y+h-radius);mCtx.arcTo(x+w,y+h,x+w-radius,y+h,radius);
  mCtx.lineTo(x+radius,y+h);mCtx.arcTo(x,y+h,x,y+h-radius,radius);
  mCtx.lineTo(x,y+radius);mCtx.arcTo(x,y,x+radius,y,radius);
  mCtx.closePath();
  mCtx.clip();

  if(img){
    /* cover-fit */
    const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
    const scale=Math.max(w/iw,h/ih);
    const sw=iw*scale, sh=ih*scale;
    mCtx.drawImage(img, cx-sw/2, cy-sh/2, sw, sh);
    mCtx.fillStyle='rgba(10,0,8,.12)';
    mCtx.fillRect(x,y,w,h);
  } else {
    const col=PINKS[pinkFallbackIdx%PINKS.length];
    const grad=mCtx.createRadialGradient(cx,cy,2,cx,cy,w*.7);
    grad.addColorStop(0,col); grad.addColorStop(1,'#1a0010');
    mCtx.fillStyle=grad;
    mCtx.fillRect(x,y,w,h);
    mCtx.fillStyle='rgba(255,255,255,.3)';
    mCtx.font=`${w*.35}px serif`;
    mCtx.textAlign='center'; mCtx.textBaseline='middle';
    mCtx.fillText('♥',cx,cy+w*.08);
  }
  mCtx.restore();

  /* glowing border */
  mCtx.save();
  const x2=cx-w/2, y2=cy-h/2;
  mCtx.beginPath();
  mCtx.moveTo(x2+radius,y2);
  mCtx.lineTo(x2+w-radius,y2);mCtx.arcTo(x2+w,y2,x2+w,y2+radius,radius);
  mCtx.lineTo(x2+w,y2+h-radius);mCtx.arcTo(x2+w,y2+h,x2+w-radius,y2+h,radius);
  mCtx.lineTo(x2+radius,y2+h);mCtx.arcTo(x2,y2+h,x2,y2+h-radius,radius);
  mCtx.lineTo(x2,y2+radius);mCtx.arcTo(x2,y2,x2+radius,y2,radius);
  mCtx.closePath();
  mCtx.strokeStyle='rgba(255,45,120,.8)';
  mCtx.lineWidth=3;
  mCtx.shadowColor='#ff2d78'; mCtx.shadowBlur=16;
  mCtx.stroke();
  mCtx.restore();
}

function drawMosaic(){
  const canvas=document.getElementById('mosaic-canvas');
  const vw=window.innerWidth, vh=window.innerHeight;

  /* canvas fills the viewport */
  canvas.width=vw; canvas.height=vh;
  canvas.style.width=vw+'px'; canvas.style.height=vh+'px';

  /* tile size — responsive */
  const tileW=Math.min(vw*.22, vh*.18, 160);
  const tileH=tileW*1.15;
  const radius=Math.round(tileW*.12);

  /* heart scale so tiles fit nicely around the perimeter */
  /* REDUCED heartScale to ensure all 14 pictures fit within screen boundaries */
  const heartScale=Math.min(vw,vh)*0.026; 
  const hcx=vw/2, hcy=vh*0.48;

  /* place 14 photos evenly around the heart perimeter */
  const N=14;
  const tValues=[];
  for(let i=0;i<N;i++) tValues.push((i/N)*Math.PI*2);

  /* preload images */
  const loaded=Array(N).fill(null);
  let pending=0;
  for(let i=0;i<N;i++){
    if(userImages[i]){
      pending++;
      const img=new Image();
      img.onload=(function(idx,im){return function(){loaded[idx]=im;pending--;if(pending===0)animateBorderTiles(canvas,loaded,tValues,heartScale,hcx,hcy,tileW,tileH,radius);};})(i,img);
      img.onerror=(function(){return function(){pending--;if(pending===0)animateBorderTiles(canvas,loaded,tValues,heartScale,hcx,hcy,tileW,tileH,radius);};})(i);
      img.src=userImages[i];
    }
  }
  if(pending===0) animateBorderTiles(canvas,loaded,tValues,heartScale,hcx,hcy,tileW,tileH,radius);
}

function animateBorderTiles(canvas,loaded,tValues,heartScale,hcx,hcy,tileW,tileH,radius){
  const mCtx=canvas.getContext('2d');
  mCtx.clearRect(0,0,canvas.width,canvas.height);

  drawHeartOutline(mCtx, hcx, hcy, heartScale, canvas.width, canvas.height);

  tValues.forEach((t,i)=>{
    setTimeout(()=>{
      const pt=heartPoint(t);
      const cx=hcx+pt.x*heartScale;
      const cy=hcy+pt.y*heartScale;
      drawImageTile(mCtx, loaded[i], cx, cy, tileW, tileH, radius, i);
    }, i*500); /* INCREASED delay from 260 to 500 for a slower appearing animation */
  });
}

function drawHeartOutline(mCtx, hcx, hcy, scale, cw, ch){
  mCtx.save();
  mCtx.beginPath();
  for(let i=0;i<=200;i++){
    const t=(i/200)*Math.PI*2;
    const pt=heartPoint(t);
    const x=hcx+pt.x*scale, y=hcy+pt.y*scale;
    i===0?mCtx.moveTo(x,y):mCtx.lineTo(x,y);
  }
  mCtx.closePath();
  mCtx.strokeStyle='rgba(255,45,120,.18)';
  mCtx.lineWidth=2;
  mCtx.setLineDash([6,10]);
  mCtx.stroke();
  mCtx.restore();
}

====================================================== */

userImages = [
   '1.JPEG',
  /* slot 2 */ '14.JPEG',
  /* slot 3 */ '3.JPEG',
  /* slot 4 */ '5.JPEG',
  /* slot 5 */ '4.JPEG',
  /* slot 6 */ '6.JPEG',
  /* slot 7 */ '7.JPEG',
  '8.JPEG',
  /* slot 2 */ '9.JPG',
  /* slot 3 */ '10.JPG',
  /* slot 4 */ '11.JPG',
  /* slot 5 */ '12.JPG',
  /* slot 6 */ '13.JPG',
  /* slot 7 */ '2.JPEG',
];

document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=ev=>{
    userImages[currentSlide]=ev.target.result;
    buildSlideshow();
    goSlide(currentSlide);
  };
  reader.readAsDataURL(file);
});
